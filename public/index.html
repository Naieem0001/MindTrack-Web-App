<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindTrack - Welcome</title>
    <meta name="api-base" content="https://mindtrack-g2ri.onrender.com" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Outfit', sans-serif;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      .glass-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        transition: all 0.3s ease;
      }
      .glass-input:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #a78bfa;
        color: white;
        box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.2);
      }
      .glass-input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
      .btn-primary-gradient {
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        border: none;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn-primary-gradient:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
      }
    </style>
  </head>
  <body class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-950 text-white flex items-center">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="text-center mb-5">
            <h1 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-indigo-400 drop-shadow-sm mb-3">MindTrack</h1>
            <p class="text-white/70 text-lg">
              Understand your mind. Track daily stress, mood, and sleep.
            </p>
          </div>

          <div class="card p-5 glass-card rounded-4">
            <h2 class="h4 mb-4 font-bold text-center tracking-wide text-purple-300 drop-shadow">Get Started</h2>

            <div class="mb-3">
              <input
                id="name"
                class="form-control form-control-lg glass-input rounded-3"
                placeholder="Full Name (for new accounts)"
              />
            </div>
            <div class="mb-3">
              <input
                id="email"
                type="email"
                class="form-control form-control-lg glass-input rounded-3"
                placeholder="Email Address"
              />
            </div>
            <div class="mb-4">
              <input
                id="password"
                type="password"
                class="form-control form-control-lg glass-input rounded-3"
                placeholder="Password"
              />
            </div>
            <div class="d-flex flex-column gap-3">
              <button class="btn btn-primary-gradient btn-lg text-white font-medium rounded-3" onclick="login()">
                Sign In
              </button>
              <button class="btn btn-outline-light btn-lg rounded-3 border-white/20 hover:bg-white/10" onclick="register()">
                Create Account
              </button>
            </div>
            
            <div
              id="authMsg"
              class="mt-4 text-center text-sm font-medium d-none p-2 rounded-3"
            ></div>

            <div class="mt-5 text-center px-4">
              <div class="text-white/50 text-xs">
                This is a general wellness support tool, not a medical diagnosis. <br/>
                <span class="text-white/70 font-semibold mt-1 d-block">If you feel unsafe, seek emergency help immediately.</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
