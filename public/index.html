<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mental Health Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-slate-100 min-h-screen">
    <div class="container py-4">
      <h1 class="text-3xl font-bold mb-4">MindTrack - 48h Hackathon MVP</h1>
      <div class="alert alert-secondary mb-3" role="alert">
        This tool provides general wellness support and is not a medical diagnosis.
        If you feel unsafe, seek emergency help immediately.
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <div class="card p-3">
            <h2 class="h5">Register / Login</h2>
            <input id="name" class="form-control my-2" placeholder="Name (for register)" />
            <input id="email" class="form-control my-2" placeholder="Email" />
            <input id="password" class="form-control my-2" placeholder="Password" type="password" />
            <div class="d-flex gap-2">
              <button class="btn btn-primary" onclick="register()">Register</button>
              <button class="btn btn-outline-primary" onclick="login()">Login</button>
            </div>
            <p id="authMsg" class="mt-2 text-sm text-slate-600"></p>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card p-3">
            <h2 class="h5">Daily Check-in</h2>
            <div class="row g-2">
              <div class="col-6"><input id="mood" type="number" min="1" max="5" class="form-control" placeholder="Mood (1-5)" /></div>
              <div class="col-6"><input id="stress" type="number" min="1" max="5" class="form-control" placeholder="Stress (1-5)" /></div>
              <div class="col-6"><input id="anxiety" type="number" min="1" max="5" class="form-control" placeholder="Anxiety (1-5)" /></div>
              <div class="col-6"><input id="sleep" type="number" min="1" max="5" class="form-control" placeholder="Sleep (1-5)" /></div>
              <div class="col-6"><input id="energy" type="number" min="1" max="5" class="form-control" placeholder="Energy (1-5)" /></div>
              <div class="col-12"><input id="symptoms" class="form-control" placeholder="Symptoms (comma separated)" /></div>
              <div class="col-12"><textarea id="notes" class="form-control" placeholder="What happened today?"></textarea></div>
            </div>
            <button class="btn btn-success mt-2" onclick="submitCheckin()">Save Check-in</button>
            <p id="checkinMsg" class="mt-2 text-sm text-slate-600"></p>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card p-3">
            <h2 class="h5">Weekly/Monthly Trends</h2>
            <select id="days" class="form-select w-auto mb-2" onchange="loadReport()">
              <option value="7">Last 7 days</option>
              <option value="30">Last 30 days</option>
            </select>
            <canvas id="trendChart" height="100"></canvas>
            <p id="latestInsight" class="mt-3 text-sm text-slate-700"></p>

            <div class="mt-3" id="riskSection" style="display: none;">
              <div class="d-flex align-items-center gap-2">
                <span id="riskBadge" class="badge bg-success">Risk: Low</span>
                <span id="riskScore" class="text-sm text-slate-600"></span>
              </div>
              <p id="riskSummary" class="mt-2 text-sm text-slate-800"></p>
              <ul id="riskRecs" class="mt-2 text-sm"></ul>
              <p id="riskHelp" class="mt-2 text-sm text-slate-700"></p>
            </div>

            <hr class="my-3" />
            <h3 class="h6 mb-2">Book an appointment (demo request)</h3>
            <div class="row g-2">
              <div class="col-md-6">
                <select id="bookingType" class="form-select">
                  <option value="Counsellor">Counsellor</option>
                  <option value="Psychiatrist">Psychiatrist</option>
                </select>
              </div>
              <div class="col-md-6">
                <input
                  id="bookingLocation"
                  class="form-control"
                  placeholder="Location (city/area)"
                />
              </div>
              <div class="col-md-6">
                <input
                  id="preferredTime"
                  class="form-control"
                  placeholder="Preferred time (optional)"
                />
              </div>
              <div class="col-md-12">
                <textarea
                  id="bookingMessage"
                  class="form-control"
                  placeholder="Short message (optional)"
                ></textarea>
              </div>
            </div>
            <button class="btn btn-primary mt-2" onclick="requestBooking()">
              Request Appointment
            </button>
            <p id="bookingMsg" class="mt-2 text-sm text-slate-600"></p>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3">
            <h2 class="h5">Safe Support Chatbot</h2>
            <textarea id="chatInput" class="form-control" placeholder="Share how you feel..."></textarea>
            <button class="btn btn-dark mt-2" onclick="sendChat()">Get Suggestion</button>
            <p id="chatReply" class="mt-2 text-sm text-slate-700"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
