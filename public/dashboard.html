<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindTrack - Dashboard</title>
    <meta name="api-base" content="https://mindtrack-g2ri.onrender.com" />
    
    <!-- Bootstrap and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Outfit', sans-serif;
        background-attachment: fixed;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .glass-navbar {
        background: rgba(15, 23, 42, 0.8) !important;
        backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        transition: all 0.3s ease;
      }
      .glass-input:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #a78bfa;
        color: white;
        box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.2);
      }
      .glass-input::placeholder { color: rgba(255, 255, 255, 0.5); }
      select.glass-input option { background: #1e1b4b; color: white; }
      
      .btn-primary-gradient {
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        border: none;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn-primary-gradient:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
      }

      /* Chat Offcanvas Styling */
      .glass-offcanvas {
        background: rgba(15, 23, 42, 0.95) !important;
        backdrop-filter: blur(20px);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        z-index: 1060 !important; /* Above navbar */
      }
      .chat-bubble-user {
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        border-radius: 18px 18px 0px 18px;
        padding: 10px 16px;
        color: #fff;
        max-width: 85%;
        margin-left: auto;
      }
      .chat-bubble-ai {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 18px 18px 18px 0px;
        padding: 10px 16px;
        color: #fff;
        max-width: 85%;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      /* Utilities */
      .hide-scroll::-webkit-scrollbar { display: none; }
      .fab-chat {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 1040;
        box-shadow: 0 4px 20px rgba(139, 92, 246, 0.5);
        border-radius: 50%;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #a855f7, #6366f1);
        color: white;
        transition: transform 0.2s ease;
        border: 2px solid rgba(255,255,255,0.2);
      }
      .fab-chat:hover {
        transform: scale(1.05);
        color: white;
      }
      
      /* Tabs Overrides */
      .nav-pills .nav-link {
        color: rgba(255,255,255,0.7);
        border: 1px solid rgba(255,255,255,0.1);
        transition: all 0.3s;
      }
      .nav-pills .nav-link:hover {
        background: rgba(255,255,255,0.1);
        color: white;
      }
      .nav-pills .nav-link.active {
        background: linear-gradient(135deg, #8b5cf6, #3b82f6) !important;
        color: white;
        border-color: transparent;
        box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
      }

      @media (max-width: 768px) {
        .glass-card { margin-bottom: 1rem; }
        .fab-chat { bottom: 16px; right: 16px; }
      }
    </style>
  </head>
  <body class="bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-950 text-white min-h-screen pb-5">
    
    <!-- Navbar (z-index adjusted to 1050 for mobile fixes) -->
    <nav class="navbar glass-navbar sticky-top px-3 py-3" style="z-index: 1050;">
      <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-indigo-400 m-0" href="#">
          MindTrack
        </a>
        <button class="btn btn-outline-danger btn-sm rounded-pill px-3 px-md-4 fw-medium border-white/20 hover:bg-white/10" onclick="logout()">
          Log out
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid px-3 px-lg-5 pt-4 mt-2" id="dashboard">
      
      <!-- Tab Controls (Massive Mobile Spacer Fix) -->
      <ul class="nav nav-pills mb-4 pb-2 gap-2 justify-content-center border-bottom border-white/10" id="dashboardTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active rounded-pill px-4 py-2 font-medium tracking-wide text-sm" id="checkin-tab" data-bs-toggle="pill" data-bs-target="#pills-checkin" type="button" role="tab" aria-controls="pills-checkin" aria-selected="true">Check-in</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link rounded-pill px-4 py-2 font-medium tracking-wide text-sm" id="trends-tab" data-bs-toggle="pill" data-bs-target="#pills-trends" type="button" role="tab" aria-controls="pills-trends" aria-selected="false">Trends</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link rounded-pill px-4 py-2 font-medium tracking-wide text-sm" id="appointments-tab" data-bs-toggle="pill" data-bs-target="#pills-appointments" type="button" role="tab" aria-controls="pills-appointments" aria-selected="false">Appointments</button>
        </li>
      </ul>

      <!-- Tab Contents -->
      <div class="tab-content" id="pills-tabContent">
        
        <!-- Tab 1: Check-in -->
        <div class="tab-pane fade show active" id="pills-checkin" role="tabpanel" aria-labelledby="checkin-tab">
          <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-xl-7">
              <div class="card p-4 glass-card rounded-4 h-100 border-t-2 border-t-purple-500/50">
                <h2 class="h5 mb-4 font-semibold text-purple-300">Daily Check-in</h2>
                <div class="row g-3">
                  <div class="col-6 col-md-4">
                    <label class="text-xs text-white/60 mb-1 ms-1">Mood</label>
                    <input id="mood" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1-5" />
                  </div>
                  <div class="col-6 col-md-4">
                    <label class="text-xs text-white/60 mb-1 ms-1">Stress</label>
                    <input id="stress" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1-5" />
                  </div>
                  <div class="col-6 col-md-4">
                    <label class="text-xs text-white/60 mb-1 ms-1">Anxiety</label>
                    <input id="anxiety" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1-5" />
                  </div>
                  <div class="col-6 col-md-6">
                    <label class="text-xs text-white/60 mb-1 ms-1">Sleep</label>
                    <input id="sleep" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1-5" />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="text-xs text-white/60 mb-1 ms-1">Energy</label>
                    <input id="energy" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1-5" />
                  </div>
                  <div class="col-12 mt-2">
                    <label class="text-xs text-white/60 mb-1 ms-1">Date</label>
                    <input id="checkinDate" type="date" class="form-control glass-input rounded-3" />
                  </div>
                  <div class="col-12 mt-3">
                    <input id="symptoms" class="form-control glass-input rounded-3" placeholder="Symptoms? (e.g., headache, fever)" />
                  </div>
                  <div class="col-12 mt-2">
                    <textarea id="notes" class="form-control glass-input rounded-3" rows="3" placeholder="What happened today? Write your thoughts..."></textarea>
                  </div>
                </div>
                <button class="btn btn-primary-gradient mt-4 w-100 rounded-3 py-3 fw-medium text-white shadow-lg shadow-purple-500/20" onclick="submitCheckin()">
                  Save Check-in
                </button>
                <div id="checkinMsg" class="mt-3 text-sm text-center fw-medium rounded-3" style="display:none;"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Tab 2: Trends -->
        <div class="tab-pane fade" id="pills-trends" role="tabpanel" aria-labelledby="trends-tab">
          <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
              <div class="card p-4 glass-card rounded-4 d-flex flex-column border-t-2 border-t-indigo-500/50">
                <div class="d-flex flex-column flex-sm-row align-items-sm-center justify-content-between mb-4 gap-3">
                  <h2 class="h5 mb-0 font-semibold text-indigo-300">Your Trends</h2>
                  <div class="d-flex align-items-center gap-3">
                    <div class="text-white/60 text-sm fw-medium" id="totalDaysLabel"></div>
                    <select id="days" class="form-select glass-input rounded-pill px-3 py-1 w-auto text-sm" onchange="loadReport()">
                      <option value="7">Last 7 days</option>
                      <option value="30">Last 30 days</option>
                    </select>
                  </div>
                </div>
                
                <div class="flex-grow-1 position-relative w-100" style="min-height: 350px;">
                  <canvas id="trendChart"></canvas>
                </div>
                
                <div class="mt-4 p-3 rounded-3 bg-white/5 border border-white/10 text-sm shadow-inner">
                  <p id="latestInsight" class="mb-0 text-white/80 fst-italic"></p>
                </div>

                <!-- Risk Insights -->
                <div class="mt-4 p-3 rounded-3 border border-white/5" id="riskSection" style="display: none; background: rgba(0,0,0,0.2);">
                  <div class="d-flex align-items-center gap-2 mb-3">
                    <span id="riskBadge" class="badge px-3 py-2 rounded-pill font-medium border text-xs tracking-wide">Risk</span>
                    <span id="riskScore" class="text-sm fw-bold text-white/80"></span>
                  </div>
                  <p id="riskSummary" class="text-sm text-white/90 mb-2"></p>
                  <div class="mt-3">
                    <div class="text-[10px] text-white/50 text-uppercase fw-bold mb-2 tracking-wider">Recommendations</div>
                    <ul id="riskRecs" class="text-sm text-white/80 mb-0 ps-3 leading-relaxed"></ul>
                  </div>
                  <p id="riskHelp" class="mt-3 text-sm text-danger-subtle fw-medium mb-0"></p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Tab 3: Appointments -->
        <div class="tab-pane fade" id="pills-appointments" role="tabpanel" aria-labelledby="appointments-tab">
          <div class="row justify-content-center g-4">
            
            <!-- Book Appointment Form -->
            <div class="col-12 col-lg-6">
              <div class="card p-4 glass-card rounded-4 h-100">
                <h2 class="h5 mb-4 font-semibold text-blue-300">Request Appointment</h2>
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="text-xs text-white/60 mb-1 ms-1">Specialist</label>
                    <select id="bookingType" class="form-select glass-input rounded-3 text-sm">
                      <option value="Counsellor">Counsellor</option>
                      <option value="Psychiatrist">Psychiatrist</option>
                    </select>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="text-xs text-white/60 mb-1 ms-1">Location</label>
                    <input id="bookingLocation" class="form-control glass-input rounded-3 text-sm" placeholder="City / Area" />
                  </div>
                  <div class="col-12 col-md-6">
                    <input id="preferredTime" class="form-control glass-input rounded-3 text-sm" placeholder="Preferred time (e.g. 10 AM)" />
                  </div>
                  <div class="col-12 col-md-6">
                    <input id="bookingPhone" type="tel" class="form-control glass-input rounded-3 text-sm" placeholder="Phone Number" />
                  </div>
                  <div class="col-12">
                    <textarea id="bookingMessage" class="form-control glass-input rounded-3 text-sm" rows="3" placeholder="Brief message explaining your need..."></textarea>
                  </div>
                </div>
                <button class="btn btn-outline-light mt-4 w-100 rounded-3 py-2 fw-medium border-white/20 hover:bg-white/10 transition-colors" onclick="requestBooking()">
                  Submit Request
                </button>
                <div id="bookingMsg" class="mt-3 text-sm text-center fw-medium rounded-3" style="display:none;"></div>
              </div>
            </div>

            <!-- Appointment History -->
            <div class="col-12 col-lg-6">
              <div class="card p-4 glass-card rounded-4 h-100">
                <h2 class="h5 mb-4 font-semibold text-blue-300 d-flex align-items-center justify-content-between">
                  Your Appointments
                  <button class="btn btn-sm btn-link text-white/50 text-decoration-none" onclick="fetchAppointments()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-clockwise" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
                  </button>
                </h2>
                <div id="bookingList" class="overflow-auto hide-scroll d-flex flex-column gap-3" style="max-height: 380px;">
                  <div class="text-white/50 text-center text-sm py-5">Loading appointments...</div>
                </div>
              </div>
            </div>
            
          </div>
        </div>

      </div> <!-- End Tab Content -->

    </div>

    <!-- Floating Action Button for Chatbot -->
    <button class="fab-chat" type="button" data-bs-toggle="offcanvas" data-bs-target="#chatDrawer" aria-controls="chatDrawer">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
        <path d="M16 8c0 3.866-3.582 7-8 7a9 9 0 0 1-2.347-.306c-.584.296-1.925.864-4.181 1.234-.2.032-.352-.176-.273-.362.354-.836.674-1.95.77-2.966C.744 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7M7.194 6.766a1.7 1.7 0 0 0-.227-.272 1.5 1.5 0 0 0-.469-.324l-.008-.004A1.8 1.8 0 0 0 5.734 6C4.776 6 4 6.746 4 7.667c0 .92.776 1.666 1.734 1.666.343 0 .662-.095.931-.26-.137.382-.39.805-.81 1.22a.405.405 0 0 0 .281.7c1.458-.095 2.532-.82 2.97-1.298a.185.185 0 0 0 .02-.047c.184-.468.271-.977.271-1.558 0-.58-.1-1.118-.203-1.324Zm4.167 0a1.7 1.7 0 0 0-.227-.272 1.5 1.5 0 0 0-.469-.324l-.008-.004A1.8 1.8 0 0 0 9.901 6c-.958 0-1.734.746-1.734 1.667 0 .92.776 1.666 1.734 1.666.343 0 .662-.095.931-.26-.137.382-.39.805-.81 1.22a.405.405 0 0 0 .281.7c1.458-.095 2.532-.82 2.97-1.298a.185.185 0 0 0 .02-.047c.184-.468.271-.977.271-1.558 0-.58-.1-1.118-.203-1.324Z"/>
      </svg>
    </button>

    <!-- AI Chatbot Offcanvas -->
    <div class="offcanvas offcanvas-end glass-offcanvas" tabindex="-1" id="chatDrawer" aria-labelledby="chatDrawerLabel">
      <div class="offcanvas-header border-bottom border-white/10">
        <h5 class="offcanvas-title fw-bold text-indigo-300 d-flex align-items-center gap-2" id="chatDrawerLabel">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.25-5v1.5a.25.25 0 0 1-.5 0V11a.25.25 0 0 1 .5 0zM7.5 9.423a1.5 1.5 0 1 1 1 0v.577a.5.5 0 0 1-1 0v-.577zM8.5 6a1.5 1.5 0 1 0-1.5 1.5A1.5 1.5 0 0 0 8.5 6z"/>
          </svg>
          AI Companion
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column p-0">
        <div id="chatHistory" class="flex-grow-1 p-3 overflow-auto hide-scroll d-flex flex-column gap-3">
          <div class="chat-bubble-ai text-sm shadow-sm">
            Hello! I am your AI Companion. I'm here to listen and provide supportive suggestions. How are you feeling today?
          </div>
        </div>
        <div class="p-3 border-top border-white/10 bg-slate-900/50 backdrop-blur-md">
          <div class="input-group">
            <input id="chatInput" type="text" class="form-control glass-input rounded-start-pill py-2 ps-3 border-end-0" placeholder="Type a message..." onkeypress="handleChatEnter(event)">
            <button class="btn btn-primary-gradient rounded-end-pill px-4" type="button" onclick="sendChat()">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 16 16"><path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07Zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493Z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Script Configuration -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      Chart.defaults.color = 'rgba(255, 255, 255, 0.7)';
      Chart.defaults.font.family = "'Outfit', sans-serif";
      Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.1)';
      Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(15, 23, 42, 0.9)';
      Chart.defaults.plugins.tooltip.titleColor = '#fff';
      Chart.defaults.plugins.tooltip.padding = 10;
      Chart.defaults.plugins.tooltip.cornerRadius = 8;
    </script>
    <script src="js/app.js"></script>
    <script>
      window.addEventListener("load", () => {
        const t = localStorage.getItem("token");
        if (!t) window.location.href = "index.html";
        else {
          window.__mindtrack_token__ = t;
          loadReport();
          fetchAppointments();
        }
      });
      // Ensure Chart Resizing when tab is changed
      document.querySelectorAll('button[data-bs-toggle="pill"]').forEach((tabElement) => {
        tabElement.addEventListener('shown.bs.tab', function (event) {
          if (event.target.id === 'trends-tab' && chart) {
            chart.resize();
          }
        });
      });
    </script>
  </body>
</html>
