<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindTrack - Dashboard</title>
    <meta name="api-base" content="https://mindtrack-g2ri.onrender.com" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Outfit', sans-serif;
        background-attachment: fixed;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .glass-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      }
      .glass-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        transition: all 0.3s ease;
      }
      .glass-input:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #a78bfa;
        color: white;
        box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.2);
      }
      .glass-input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
      /* specific style for select options since they might look ugly with dark background */
      select.glass-input option {
        background: #1e1b4b;
        color: white;
      }
      .btn-primary-gradient {
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        border: none;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn-primary-gradient:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
      }
      .btn-glass {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        transition: all 0.2s;
      }
      .btn-glass:hover {
        background: rgba(255, 255, 255, 0.2);
        color: white;
      }
    </style>
  </head>
  <body class="min-h-screen bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-950 text-white">
    <div class="container py-5">
      <!-- Header -->
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-5 border-bottom border-white/10 pb-4">
        <div>
          <h1 class="text-3xl font-bold mb-1 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-indigo-400">MindTrack Dashboard</h1>
          <div class="text-white/60 text-sm font-medium">
            Let's see how you're doing today.
          </div>
        </div>
        <button class="btn btn-glass px-4 rounded-pill fw-medium" onclick="logout()">
          Log out
        </button>
      </div>

      <!-- Main Layout -->
      <div class="row g-4">
        
        <!-- Daily Check-in -->
        <div class="col-lg-5">
          <div class="card p-4 glass-card rounded-4 h-100">
            <h2 class="h5 mb-4 font-semibold text-purple-300">Daily Check-in</h2>
            <div class="row g-3">
              <div class="col-6">
                <label class="text-xs text-white/60 mb-1 ms-1">Mood (1-5)</label>
                <input id="mood" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1 = low, 5 = high" />
              </div>
              <div class="col-6">
                <label class="text-xs text-white/60 mb-1 ms-1">Stress (1-5)</label>
                <input id="stress" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1 = low, 5 = high" />
              </div>
              <div class="col-6">
                <label class="text-xs text-white/60 mb-1 ms-1">Anxiety (1-5)</label>
                <input id="anxiety" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1 = low, 5 = high" />
              </div>
              <div class="col-6">
                <label class="text-xs text-white/60 mb-1 ms-1">Sleep (1-5)</label>
                <input id="sleep" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1 = low, 5 = high" />
              </div>
              <div class="col-sm-6">
                <label class="text-xs text-white/60 mb-1 ms-1">Energy (1-5)</label>
                <input id="energy" type="number" min="1" max="5" class="form-control glass-input rounded-3" placeholder="1 = low, 5 = high" />
              </div>
              <div class="col-sm-6">
                <label class="text-xs text-white/60 mb-1 ms-1">Date (Optional)</label>
                <input id="checkinDate" type="date" class="form-control glass-input rounded-3" />
              </div>
              <div class="col-12 mt-4">
                <input id="symptoms" class="form-control glass-input rounded-3" placeholder="Physical Symptoms (e.g., headache, fatigue)" />
              </div>
              <div class="col-12">
                <textarea id="notes" class="form-control glass-input rounded-3" rows="3" placeholder="What happened today? Any thoughts?"></textarea>
              </div>
            </div>
            <button class="btn btn-primary-gradient mt-4 w-100 rounded-3 py-2 fw-medium text-white" onclick="submitCheckin()">
              Save Check-in
            </button>
            <div id="checkinMsg" class="mt-3 text-sm text-center fw-medium rounded-3" style="display:none;"></div>
          </div>
        </div>

        <!-- Weekly / Monthly Trends -->
        <div class="col-lg-7">
          <div class="card p-4 glass-card rounded-4 h-100 d-flex flex-column">
            <div class="d-flex align-items-center justify-content-between mb-4">
              <h2 class="h5 mb-0 font-semibold text-purple-300">Your Trends</h2>
              <div class="d-flex align-items-center gap-3">
                <div class="text-white/60 text-sm fw-medium" id="totalDaysLabel"></div>
                <select id="days" class="form-select glass-input rounded-pill px-3 py-1 w-auto text-sm" onchange="loadReport()">
                  <option value="7">Last 7 days</option>
                  <option value="30">Last 30 days</option>
                </select>
              </div>
            </div>
            
            <div class="flex-grow-1 position-relative" style="min-height: 250px;">
              <canvas id="trendChart"></canvas>
            </div>
            
            <div class="mt-4 p-3 rounded-3 bg-white/5 border border-white/10 text-sm">
              <p id="latestInsight" class="mb-0 text-white/80 fst-italic"></p>
            </div>

            <div class="mt-4 p-3 rounded-3" id="riskSection" style="display: none; background: rgba(0,0,0,0.2);">
              <div class="d-flex align-items-center gap-2 mb-2">
                <span id="riskBadge" class="badge px-3 py-2 rounded-pill font-medium border">Risk: Low</span>
                <span id="riskScore" class="text-sm fw-bold text-white/80"></span>
              </div>
              <p id="riskSummary" class="text-sm text-white/90 mb-2"></p>
              <div>
                <div class="text-xs text-white/60 text-uppercase fw-bold mb-1 tracking-wider">Recommendations</div>
                <ul id="riskRecs" class="text-sm text-white/80 mb-0 ps-3"></ul>
              </div>
              <p id="riskHelp" class="mt-3 text-sm text-danger-subtle fw-medium mb-0"></p>
            </div>
          </div>
        </div>

        <!-- Safe Support Chatbot -->
        <div class="col-md-6">
          <div class="card p-4 glass-card rounded-4 h-100">
            <h2 class="h5 mb-3 font-semibold text-indigo-300 d-flex align-items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-chat-quote-fill" viewBox="0 0 16 16">
                <path d="M16 8c0 3.866-3.582 7-8 7a9 9 0 0 1-2.347-.306c-.584.296-1.925.864-4.181 1.234-.2.032-.352-.176-.273-.362.354-.836.674-1.95.77-2.966C.744 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7M7.194 6.766a1.7 1.7 0 0 0-.227-.272 1.5 1.5 0 0 0-.469-.324l-.008-.004A1.8 1.8 0 0 0 5.734 6C4.776 6 4 6.746 4 7.667c0 .92.776 1.666 1.734 1.666.343 0 .662-.095.931-.26-.137.382-.39.805-.81 1.22a.405.405 0 0 0 .281.7c1.458-.095 2.532-.82 2.97-1.298a.185.185 0 0 0 .02-.047c.184-.468.271-.977.271-1.558 0-.58-.1-1.118-.203-1.324Zm4.167 0a1.7 1.7 0 0 0-.227-.272 1.5 1.5 0 0 0-.469-.324l-.008-.004A1.8 1.8 0 0 0 9.901 6c-.958 0-1.734.746-1.734 1.667 0 .92.776 1.666 1.734 1.666.343 0 .662-.095.931-.26-.137.382-.39.805-.81 1.22a.405.405 0 0 0 .281.7c1.458-.095 2.532-.82 2.97-1.298a.185.185 0 0 0 .02-.047c.184-.468.271-.977.271-1.558 0-.58-.1-1.118-.203-1.324Z"/>
              </svg>
              AI Companion
            </h2>
            <textarea
              id="chatInput"
              class="form-control glass-input rounded-3 mb-3"
              rows="3"
              placeholder="Share how you feel... I'm here to listen."
            ></textarea>
            <button class="btn btn-outline-light rounded-pill px-4" onclick="sendChat()">
              Get Suggestion
            </button>
            <div id="chatReply" class="mt-4 text-sm text-white/90 p-3 bg-white/5 border border-white/10 rounded-3 d-none"></div>
          </div>
        </div>

        <!-- Appointment Card -->
        <div class="col-md-6">
          <div class="card p-4 glass-card rounded-4 h-100">
            <h2 class="h5 mb-3 font-semibold text-indigo-300 d-flex align-items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-calendar-heart" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M4 .5a.5.5 0 0 0-1 0V1H2a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-1V.5a.5.5 0 0 0-1 0V1H4zM1 14V4h14v10a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1m7-6.507c1.564-2.118 4.084-1.037 4.084 1.059 0 1.944-3.15 4.39-4.084 5.39-.934-1-4.084-3.446-4.084-5.39 0-2.096 2.52-3.177 4.084-1.059"/>
              </svg>
              Book an Appointment
            </h2>
            <div class="row g-3">
              <div class="col-sm-6">
                <select id="bookingType" class="form-select glass-input rounded-3 text-sm">
                  <option value="Counsellor">Counsellor</option>
                  <option value="Psychiatrist">Psychiatrist</option>
                </select>
              </div>
              <div class="col-sm-6">
                <input id="bookingLocation" class="form-control glass-input rounded-3 text-sm" placeholder="Location/City" />
              </div>
              <div class="col-sm-6">
                <input id="preferredTime" class="form-control glass-input rounded-3 text-sm" placeholder="Preferred time (optional)" />
              </div>
              <div class="col-sm-6">
                <input id="bookingPhone" class="form-control glass-input rounded-3 text-sm" placeholder="Phone (optional)" />
              </div>
              <div class="col-12">
                <textarea id="bookingMessage" class="form-control glass-input rounded-3 text-sm" rows="2" placeholder="Brief message (optional)"></textarea>
              </div>
            </div>
            <button class="btn btn-primary-gradient mt-4 w-100 rounded-3 py-2 fw-medium text-white" onclick="requestBooking()">
              Request Demo Appointment
            </button>
            <div id="bookingMsg" class="mt-3 text-sm text-center fw-medium rounded-3" style="display:none;"></div>
          </div>
        </div>

      </div> <!-- End row -->

      <div class="mt-5 text-center text-white/50 text-xs px-3">
        This is a general wellness support tool, not a medical diagnosis. <br/>
        If you feel unsafe, seek emergency help immediately.
      </div>
    </div>

    <!-- Chart.js configuration -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Add better default colors to Chart.js globally -->
    <script>
      Chart.defaults.color = 'rgba(255, 255, 255, 0.7)';
      Chart.defaults.font.family = "'Outfit', sans-serif";
      Chart.defaults.scale.grid.color = 'rgba(255, 255, 255, 0.1)';
      Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(15, 23, 42, 0.9)';
      Chart.defaults.plugins.tooltip.titleColor = '#fff';
      Chart.defaults.plugins.tooltip.padding = 10;
      Chart.defaults.plugins.tooltip.cornerRadius = 8;
    </script>
    <script src="js/app.js"></script>
    <script>
      window.addEventListener("load", () => {
        const t = localStorage.getItem("token");
        if (!t) window.location.href = "index.html";
        else {
          window.__mindtrack_token__ = t;
          loadReport();
        }
      });
    </script>
  </body>
</html>
